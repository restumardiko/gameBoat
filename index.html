<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>gameBoat</title>
  </head>
  <body>
    <header>TETRIS</header>
    <main>
      <div class="canvas-cover">

        <canvas id="canvas" width="250" height="500"></canvas>
      </div>
      <h1 id="paus">PAUSED</h1>
      <aside class="game-status">
        <p id="highScore">High Score :<span>0</span></p>
        <p id="score">Score :<span>0</span></p>
        <p id="level">Level :<span>1</span></p>
        <div class="control">
          <button  id="restart">restart</button>
          <button id="reset">reset</button>
        </div>
        <div class ='controler'>
          <button id="onDown">↓</button>
          <button id="onLeft">←</button>
          <button id="onUp">↑</button>
          <button id="onRight">→</button>
          <button id="onSpace">pause</button>
        </div>
      </aside>
      </main>
    </div>
   
   
    <script src="script.js"></script>
  </body>
</html>
